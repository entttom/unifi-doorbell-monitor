<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haus Stream</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="stream-page">
    <main class="stream-shell">
      <section class="stream-panel">
        <div
          class="stream-frame-wrap"
          id="stream-frame-wrap"
          role="button"
          tabindex="0"
          title="Tippen zum Schließen"
          aria-label="Kamerastream – tippen oder Escape zum Schließen"
        >
          <iframe
            class="stream-frame"
            id="stream-frame"
            title="Kamerastream"
            allow="autoplay; fullscreen; camera; microphone"
          ></iframe>
        </div>
      </section>

      <aside class="stream-actions-panel" id="stream-actions-panel" aria-labelledby="stream-actions-title">
        <header class="panel-header compact">
          <div>
            <p class="eyebrow">Aktionen</p>
            <h2 id="stream-actions-title">Steuerung</h2>
          </div>
          <p class="panel-note" id="stream-status-note">Bereit</p>
        </header>
        <div class="stream-actions-list" id="stream-actions-list">
          <div class="empty-state">
            <p>Keine Aktionen für diesen Stream.</p>
          </div>
        </div>
        <div class="stream-camera-switch-wrap" id="stream-camera-switch-wrap" hidden>
          <button type="button" class="stream-camera-switch-button" id="stream-camera-switch-button">
            Andere Kamera
          </button>
        </div>
      </aside>
    </main>

    <script src="stream.js"></script>
  </body>
</html>
